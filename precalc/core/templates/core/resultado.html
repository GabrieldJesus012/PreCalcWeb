{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/resultadostyle.css' %}">
    <link rel="stylesheet" href="{% static 'css/print.css' %}" media="print">
    <title>PreCalc - Resultado {{ calculo.numero_processo }}</title>
    <script src="{% static 'resultados/r1-cabecalho.js' %}"></script>
    <script src="{% static 'resultados/r2-calculos.js' %}"></script>
    <script src="{% static 'resultados/r3-honorarios-suc.js' %}"></script>
    <script src="{% static 'resultados/r4-deducoesacess.js' %}"></script>
    <script src="{% static 'resultados/r7-cessoesbenefi.js' %}"></script>
    <script src="{% static 'resultados/r8-herdeiros.js' %}"></script>
    <script src="{% static 'resultados/r9-cessoes-herdeiros.js' %}"></script>
    <script src="{% static 'resultados/r10-pagamentosrecebido.js' %}"></script>
    <script src="{% static 'resultados/r11-previdencia.js' %}"></script>
    <script src="{% static 'resultados/r11-ir.js' %}"></script>
    <script src="{% static 'resultados/r11-deducoeslegais.js' %}"></script>
    <script src="{% static 'resultados/r12-pagamentofinal.js' %}"></script>
    <script src="{% static 'resultados/resultados.js' %}"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PreCalc</h1>
            <p>Sistema de Cálculo de Precatórios</p>
        </div>
    </div>

    <div style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <a href="/historico/" style="color: #666; text-decoration: none;">← Histórico</a>
                <span style="margin: 0 8px; color: #ccc;">|</span>
                <a href="/" style="color: #666; text-decoration: none;">➕ Novo Cálculo</a>
            </div>
            <div style="font-size: 0.85em; color: #666;">
                Calculado em {{ calculo.data_calculo|date:"d/m/Y H:i" }}
            </div>
        </div>

        <div id="resultadosContent" class="results" style="background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);"></div>
    </div>
    <input type="hidden" id="dataatualizacao" value="{{ calculo.data_atualizacao|date:'Y-m-d' }}">
    
    <script>
        const resultados = {{ resultados_json|safe }};
        const dados = {{ dados_json|safe }};

        function navegarParaResultados() {
            document.getElementById('resultadosContent')?.scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            exibirResultados(resultados, dados);
        });
        function showTab(tab) {} // não usada na página de resultado
        
    </script>

</body>
</html>
