<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PreCalc — Histórico</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --navy: #1A2332;
    --blue: #1E6EA6;
    --blue-light: #EBF4FB;
    --gold: #C5A572;
    --green: #1A6B3C;
    --green-light: #EAFAF1;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #6B7280;
    --gray-800: #1F2937;
    --white: #FFFFFF;
    --border: #E5E7EB;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'IBM Plex Sans',sans-serif; background:#F0F2F5; color:var(--gray-800); min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--navy); padding:0 28px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.topbar-logo { font-size:17px; font-weight:600; color:var(--white); }
.topbar-badge { font-size:11px; color:var(--gold); border:1px solid rgba(197,165,114,0.4); padding:2px 8px; border-radius:2px; }
.topbar-nav a { font-size:13px; color:rgba(255,255,255,0.6); text-decoration:none; margin-left:20px; transition:color 0.15s; }
.topbar-nav a:hover, .topbar-nav a.active { color:var(--white); }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-user { font-size:12.5px; color:rgba(255,255,255,0.6); }
.btn-logout { font-size:12px; color:rgba(255,255,255,0.4); background:none; border:1px solid rgba(255,255,255,0.15); border-radius:4px; padding:4px 10px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.15s; }
.btn-logout:hover { color:white; border-color:rgba(255,255,255,0.4); }

/* CONTENT */
.content { padding:28px 32px; max-width:1100px; margin:0 auto; }

/* PAGE HEADER */
.page-header { margin-bottom:24px; }
.page-title { font-size:22px; font-weight:600; color:var(--navy); }
.page-sub { font-size:13.5px; color:var(--gray-400); margin-top:4px; }

/* FILTROS */
.filters { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin-bottom:20px; display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; }
.filter-field { display:flex; flex-direction:column; gap:4px; }
.filter-field label { font-size:11.5px; font-weight:500; color:var(--gray-600); }
.filter-field input, .filter-field select { height:36px; padding:0 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:'IBM Plex Sans',sans-serif; outline:none; color:var(--gray-800); }
.filter-field input:focus, .filter-field select:focus { border-color:var(--blue); }
.btn-buscar { height:36px; padding:0 18px; background:var(--blue); color:white; border:none; border-radius:6px; font-size:13px; font-weight:500; font-family:'IBM Plex Sans',sans-serif; cursor:pointer; }
.btn-limpar { height:36px; padding:0 14px; background:none; border:1px solid var(--border); border-radius:6px; font-size:13px; color:var(--gray-600); font-family:'IBM Plex Sans',sans-serif; cursor:pointer; }

/* TABELA */
.table-wrap { background:var(--white); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.table-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.table-title { font-size:13.5px; font-weight:600; color:var(--navy); }
.table-count { font-size:12px; color:var(--gray-400); }

table { width:100%; border-collapse:collapse; }
thead th { background:var(--navy); color:white; padding:10px 16px; font-size:12px; font-weight:500; text-align:left; letter-spacing:0.3px; }
tbody td { padding:12px 16px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--blue-light); cursor:pointer; }

.badge { display:inline-block; font-size:11px; padding:3px 8px; border-radius:10px; font-weight:500; }
.badge-ordem { background:#EFF6FF; color:#1E40AF; }
.badge-acordo { background:#FFF7ED; color:#C2410C; }
.badge-preferencia { background:#F5F3FF; color:#5B21B6; }
.badge-parcial { background:#F0FDF4; color:#166534; }

.btn-ver { padding:5px 12px; background:var(--blue-light); border:1px solid #BFDBFE; border-radius:4px; font-size:12px; color:var(--blue); font-weight:500; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.15s; }
.btn-ver:hover { background:var(--blue); color:white; }

.btn-recarregar { padding:5px 12px; background:var(--green-light); border:1px solid #A7F3D0; border-radius:4px; font-size:12px; color:var(--green); font-weight:500; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.15s; margin-left:4px; }
.btn-recarregar:hover { background:var(--green); color:white; }

.mono { font-family:'IBM Plex Mono',monospace; font-size:12px; }
.empty { text-align:center; padding:48px; color:var(--gray-400); font-size:14px; }
.loading-row { text-align:center; padding:32px; color:var(--gray-400); }

/* MODAL VISUALIZAÇÃO */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; overflow-y:auto; padding:20px; }
.modal-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
.modal-box { background:var(--white); border-radius:10px; width:100%; max-width:1000px; margin:auto; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,0.3); }
.modal-topbar { background:var(--navy); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; }
.modal-title { font-size:14px; font-weight:600; color:white; }
.modal-meta { font-size:12px; color:rgba(255,255,255,0.5); }
.btn-fechar { background:none; border:1px solid rgba(255,255,255,0.2); color:white; border-radius:4px; padding:5px 12px; font-size:12px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; }
.modal-content { padding:0; max-height:80vh; overflow-y:auto; }
</style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-logo">PreCalc</span>
        <span class="topbar-badge">TJPI</span>
        <nav class="topbar-nav">
            <a href="index.html">🧮 Calcular</a>
            <a href="historico.html" class="active">📋 Histórico</a>
        </nav>
    </div>
    <div class="topbar-right">
        <span class="topbar-user" id="userNome"></span>
        <button class="btn-logout" onclick="sair()">Sair</button>
    </div>
</div>

<div class="content">

    <div class="page-header">
        <div class="page-title">📋 Histórico de Cálculos</div>
        <div class="page-sub">Todos os cálculos realizados pela equipe</div>
    </div>

    <div class="filters">
        <div class="filter-field">
            <label>Número do Processo</label>
            <input type="text" id="filtroProcesso" placeholder="0000000-00..." style="width:220px;">
        </div>
        <div class="filter-field">
            <label>Beneficiário</label>
            <input type="text" id="filtroBeneficiario" placeholder="Nome..." style="width:200px;">
        </div>
        <div class="filter-field">
            <label>Contador</label>
            <input type="text" id="filtroContador" placeholder="Nome..." style="width:160px;">
        </div>
        <div class="filter-field">
            <label>Tipo de Cálculo</label>
            <select id="filtroTipo" style="width:150px;">
                <option value="">Todos</option>
                <option value="ordem">Ordem</option>
                <option value="acordo">Acordo</option>
                <option value="preferencia">Preferência</option>
                <option value="parcial">Parcial</option>
            </select>
        </div>
        <div class="filter-field">
            <label>De</label>
            <input type="date" id="filtroDataDe" style="width:140px;">
        </div>
        <div class="filter-field">
            <label>Até</label>
            <input type="date" id="filtroDataAte" style="width:140px;">
        </div>
        <button class="btn-buscar" onclick="buscar()">🔍 Buscar</button>
        <button class="btn-limpar" onclick="limparFiltros()">✕ Limpar</button>
    </div>

    <div class="table-wrap">
        <div class="table-header">
            <div class="table-title">Cálculos</div>
            <div class="table-count" id="totalCount">—</div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Processo</th>
                    <th>Beneficiário</th>
                    <th>Devedor</th>
                    <th>Tipo</th>
                    <th>Contador</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody">
                <tr><td colspan="7" class="loading-row">⏳ Carregando...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<!-- MODAL DE VISUALIZAÇÃO -->
<div class="modal-overlay" id="modalVer">
    <div class="modal-box">
        <div class="modal-topbar">
            <div>
                <div class="modal-title" id="modalTitulo">Resultado do Cálculo</div>
                <div class="modal-meta" id="modalMeta"></div>
            </div>
            <button class="btn-fechar" onclick="fecharModal()">✕ Fechar</button>
        </div>
        <div class="modal-content" id="modalContent"></div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co';
const SUPABASE_KEY = 'SUA_CHAVE_ANONIMA';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// Verificar sessão
const sessao = sessionStorage.getItem('precalc_user');
if (!sessao) { window.location.href = 'login.html'; }
const user = JSON.parse(sessao);
document.getElementById('userNome').textContent = user.nome;

// Carregar ao iniciar
carregarHistorico();

async function carregarHistorico(filtros = {}) {
    const tbody = document.getElementById('tabelaBody');
    tbody.innerHTML = '<tr><td colspan="7" class="loading-row">⏳ Carregando...</td></tr>';

    let query = supabase
        .from('calculos')
        .select('id, num_processo, beneficiario, credor, tipo_calculo, contador_nome, data_calculo, dados_entrada')
        .order('data_calculo', { ascending: false })
        .limit(200);

    if (filtros.processo) query = query.ilike('num_processo', `%${filtros.processo}%`);
    if (filtros.beneficiario) query = query.ilike('beneficiario', `%${filtros.beneficiario}%`);
    if (filtros.contador) query = query.ilike('contador_nome', `%${filtros.contador}%`);
    if (filtros.tipo) query = query.eq('tipo_calculo', filtros.tipo);
    if (filtros.de) query = query.gte('data_calculo', filtros.de);
    if (filtros.ate) query = query.lte('data_calculo', filtros.ate + 'T23:59:59');

    const { data, error } = await query;

    if (error || !data?.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">Nenhum cálculo encontrado.</td></tr>';
        document.getElementById('totalCount').textContent = '0 registros';
        return;
    }

    document.getElementById('totalCount').textContent = `${data.length} registro${data.length !== 1 ? 's' : ''}`;

    const badges = {
        ordem: '<span class="badge badge-ordem">Ordem</span>',
        acordo: '<span class="badge badge-acordo">Acordo</span>',
        preferencia: '<span class="badge badge-preferencia">Preferência</span>',
        parcial: '<span class="badge badge-parcial">Parcial</span>'
    };

    tbody.innerHTML = data.map(c => {
        const data_fmt = new Date(c.data_calculo).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        return `
            <tr>
                <td class="mono">${c.num_processo || '—'}</td>
                <td>${c.beneficiario || '—'}</td>
                <td style="color:var(--gray-600);font-size:12px;">${c.credor || '—'}</td>
                <td>${badges[c.tipo_calculo] || c.tipo_calculo}</td>
                <td style="font-size:12.5px;">${c.contador_nome || '—'}</td>
                <td style="font-size:12px;color:var(--gray-600);">${data_fmt}</td>
                <td>
                    <button class="btn-ver" onclick="verCalculo('${c.id}')">👁 Ver</button>
                    <button class="btn-recarregar" onclick="recarregarCalculo('${c.id}')">↩ Recalcular</button>
                </td>
            </tr>
        `;
    }).join('');

    // Expor funções globalmente
    window._calculos = data;
}

window.buscar = function() {
    carregarHistorico({
        processo: document.getElementById('filtroProcesso').value,
        beneficiario: document.getElementById('filtroBeneficiario').value,
        contador: document.getElementById('filtroContador').value,
        tipo: document.getElementById('filtroTipo').value,
        de: document.getElementById('filtroDataDe').value,
        ate: document.getElementById('filtroDataAte').value,
    });
};

window.limparFiltros = function() {
    ['filtroProcesso','filtroBeneficiario','filtroContador','filtroTipo','filtroDataDe','filtroDataAte']
        .forEach(id => document.getElementById(id).value = '');
    carregarHistorico();
};

window.verCalculo = async function(id) {
    const { data, error } = await supabase
        .from('calculos')
        .select('*')
        .eq('id', id)
        .single();

    if (error || !data) return alert('Erro ao carregar cálculo.');

    const data_fmt = new Date(data.data_calculo).toLocaleString('pt-BR');
    document.getElementById('modalTitulo').textContent = `${data.num_processo || 'Processo'} — ${data.beneficiario || ''}`;
    document.getElementById('modalMeta').textContent = `Calculado por ${data.contador_nome} em ${data_fmt}`;
    document.getElementById('modalContent').innerHTML = data.html_resultado || '<p style="padding:32px;text-align:center;color:#999;">Resultado não disponível.</p>';
    document.getElementById('modalVer').classList.add('open');
};

window.fecharModal = function() {
    document.getElementById('modalVer').classList.remove('open');
};

window.recarregarCalculo = async function(id) {
    const { data, error } = await supabase
        .from('calculos')
        .select('dados_entrada')
        .eq('id', id)
        .single();

    if (error || !data?.dados_entrada) return alert('Erro ao carregar dados.');

    // Salvar dados no sessionStorage e abrir o calculador
    sessionStorage.setItem('precalc_recarregar', JSON.stringify(data.dados_entrada));
    window.location.href = 'index.html?recarregar=1';
};

window.sair = function() {
    sessionStorage.removeItem('precalc_user');
    window.location.href = 'login.html';
};

// Fechar modal clicando fora
document.getElementById('modalVer').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
});

// Enter para buscar
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
});
</script>

</body>
</html>
