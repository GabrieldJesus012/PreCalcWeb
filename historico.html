<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PreCalc — Histórico</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="resultados/resultadostyle.css">
<style>
:root {
    --navy: #1A2332;
    --blue: #1E6EA6;
    --blue-light: #EBF4FB;
    --gold: #C5A572;
    --green: #1A6B3C;
    --green-light: #EAFAF1;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #6B7280;
    --gray-800: #1F2937;
    --white: #FFFFFF;
    --border: #E5E7EB;
    --red: #991B1B;
    --orange: #C2410C;
    --purple: #5B21B6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'IBM Plex Sans',sans-serif; background:#F0F2F5; color:var(--gray-800); min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--navy); padding:0 28px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.topbar-logo { font-size:17px; font-weight:600; color:var(--white); }
.topbar-badge { font-size:11px; color:var(--gold); border:1px solid rgba(197,165,114,0.4); padding:2px 8px; border-radius:2px; }
.topbar-nav a { font-size:13px; color:rgba(255,255,255,0.6); text-decoration:none; margin-left:20px; transition:color 0.15s; }
.topbar-nav a:hover, .topbar-nav a.active { color:var(--white); }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-user { font-size:12.5px; color:rgba(255,255,255,0.6); }
.btn-logout { font-size:12px; color:rgba(255,255,255,0.4); background:none; border:1px solid rgba(255,255,255,0.15); border-radius:4px; padding:4px 10px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.15s; }
.btn-logout:hover { color:white; border-color:rgba(255,255,255,0.4); }

/* CONTENT */
.content { padding:24px 28px; max-width:1200px; margin:0 auto; }

/* PAGE HEADER */
.page-header { margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
.page-title { font-size:20px; font-weight:600; color:var(--navy); }
.page-sub { font-size:13px; color:var(--gray-400); margin-top:3px; }
.btn-novo { display:flex; align-items:center; gap:6px; padding:9px 18px; background:var(--blue); color:white; border:none; border-radius:6px; font-size:13px; font-weight:500; font-family:'IBM Plex Sans',sans-serif; cursor:pointer; text-decoration:none; }

/* FILTROS */
.filters { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin-bottom:16px; }
.filters-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:12px; margin-bottom:12px; }
.filter-field { display:flex; flex-direction:column; gap:4px; }
.filter-field label { font-size:11px; font-weight:600; color:var(--gray-600); text-transform:uppercase; letter-spacing:0.3px; }
.filter-field input, .filter-field select { height:34px; padding:0 10px; border:1px solid var(--border); border-radius:6px; font-size:12.5px; font-family:'IBM Plex Sans',sans-serif; outline:none; color:var(--gray-800); }
.filter-field input:focus, .filter-field select:focus { border-color:var(--blue); }
.filters-actions { display:flex; gap:8px; }
.btn-buscar { height:34px; padding:0 16px; background:var(--navy); color:white; border:none; border-radius:6px; font-size:13px; font-weight:600; font-family:'IBM Plex Sans',sans-serif; cursor:pointer; }
.btn-limpar { height:34px; padding:0 14px; background:var(--gray-100); border:1px solid var(--border); border-radius:6px; font-size:13px; color:var(--gray-600); font-family:'IBM Plex Sans',sans-serif; cursor:pointer; }

/* TABELA */
.table-wrap { background:var(--white); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.table-header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.table-title { font-size:13.5px; font-weight:600; color:var(--navy); }
.table-count { font-size:12px; color:var(--gray-400); }

table { width:100%; border-collapse:collapse; }
thead th { background:var(--navy); color:white; padding:10px 14px; font-size:11.5px; font-weight:500; text-align:left; letter-spacing:0.3px; white-space:nowrap; }
tbody td { padding:10px 14px; border-bottom:1px solid var(--border); font-size:12.5px; vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--blue-light); }

.badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; }
.badge-ordem { background:#EFF6FF; color:#1E40AF; }
.badge-acordo { background:#FFF7ED; color:#C2410C; }
.badge-preferencia { background:#F5F3FF; color:#5B21B6; }
.badge-parcial { background:#F0FDF4; color:#166534; }
.badge-alimentar { background:#D1FAE5; color:#065F46; }
.badge-comum { background:#DBEAFE; color:#1E40AF; }

.user-badge { background:var(--blue-light); color:var(--blue); padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.mono { font-family:'IBM Plex Mono',monospace; font-size:11.5px; }
.valor { font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; }

/* AÇÕES */
.acoes { display:flex; flex-direction:column; gap:4px; }
.acoes-row { display:flex; gap:4px; }
.btn-acao { padding:4px 10px; border:none; border-radius:4px; font-size:11.5px; font-weight:500; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.15s; white-space:nowrap; }
.btn-ver { background:var(--blue-light); color:var(--blue); border:1px solid #BFDBFE; }
.btn-ver:hover { background:var(--blue); color:white; }
.btn-imprimir { background:var(--gray-100); color:var(--gray-600); border:1px solid var(--border); }
.btn-imprimir:hover { background:var(--navy); color:white; }
.btn-editar { background:#FFF7ED; color:#C2410C; border:1px solid #FED7AA; }
.btn-editar:hover { background:#C2410C; color:white; }
.btn-excel { background:var(--green-light); color:var(--green); border:1px solid #A7F3D0; }
.btn-excel:hover { background:var(--green); color:white; }

.empty { text-align:center; padding:60px; color:var(--gray-400); }
.loading-row { text-align:center; padding:32px; color:var(--gray-400); }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; overflow-y:auto; padding:20px; }
.modal-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
.modal-box { background:var(--white); border-radius:10px; width:100%; max-width:1060px; margin:auto; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,0.3); }
.modal-topbar { background:var(--navy); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
.modal-info { flex:1; }
.modal-title { font-size:14px; font-weight:600; color:white; }
.modal-meta { font-size:11.5px; color:rgba(255,255,255,0.5); margin-top:2px; }
.modal-actions { display:flex; gap:8px; }
.btn-modal { padding:6px 14px; border-radius:4px; font-size:12px; font-weight:500; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; border:none; }
.btn-modal-imprimir { background:rgba(255,255,255,0.15); color:white; }
.btn-modal-excel { background:#1A6B3C; color:white; }
.btn-modal-editar { background:#C2410C; color:white; }
.btn-fechar { background:none; border:1px solid rgba(255,255,255,0.2); color:white; border-radius:4px; padding:5px 12px; font-size:12px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; }
.modal-content { padding:0; max-height:82vh; overflow-y:auto; }
</style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-logo">PreCalc</span>
        <span class="topbar-badge">TJPI</span>
        <nav class="topbar-nav">
            <a href="index.html">🧮 Calcular</a>
            <a href="historico.html" class="active">📋 Histórico</a>
        </nav>
    </div>
    <div class="topbar-right">
        <span class="topbar-user" id="userNome"></span>
        <button class="btn-logout" onclick="sair()">Sair</button>
    </div>
</div>

<div class="content">

    <div class="page-header">
        <div>
            <div class="page-title">📋 Histórico de Cálculos</div>
            <div class="page-sub">Todos os cálculos realizados pela equipe</div>
        </div>
        <a href="index.html" class="btn-novo">➕ Novo Cálculo</a>
    </div>

    <!-- FILTROS -->
    <div class="filters">
        <div class="filters-grid">
            <div class="filter-field">
                <label>Processo</label>
                <input type="text" id="filtroProcesso" placeholder="Número...">
            </div>
            <div class="filter-field">
                <label>Beneficiário</label>
                <input type="text" id="filtroBeneficiario" placeholder="Nome...">
            </div>
            <div class="filter-field">
                <label>Devedor</label>
                <input type="text" id="filtroDevedor" placeholder="Nome...">
            </div>
            <div class="filter-field">
                <label>Tipo de Cálculo</label>
                <select id="filtroTipo">
                    <option value="">Todos</option>
                    <option value="ordem">Ordem</option>
                    <option value="acordo">Acordo</option>
                    <option value="preferencia">Preferência</option>
                    <option value="parcial">Parcial</option>
                </select>
            </div>
            <div class="filter-field">
                <label>Contador</label>
                <select id="filtroContador">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-field">
                <label>Data Início</label>
                <input type="date" id="filtroDataDe">
            </div>
            <div class="filter-field">
                <label>Data Fim</label>
                <input type="date" id="filtroDataAte">
            </div>
        </div>
        <div class="filters-actions">
            <button class="btn-buscar" onclick="buscar()">🔍 Buscar</button>
            <button class="btn-limpar" onclick="limparFiltros()">✕ Limpar</button>
        </div>
    </div>

    <!-- TABELA -->
    <div class="table-wrap">
        <div class="table-header">
            <div class="table-title">Cálculos</div>
            <div class="table-count" id="totalCount">—</div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Processo</th>
                    <th>Beneficiário</th>
                    <th>Devedor</th>
                    <th>Tipo</th>
                    <th>Total Atualizado</th>
                    <th>Contador</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody">
                <tr><td colspan="9" class="loading-row">⏳ Carregando...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalVer">
    <div class="modal-box">
        <div class="modal-topbar">
            <div class="modal-info">
                <div class="modal-title" id="modalTitulo"></div>
                <div class="modal-meta" id="modalMeta"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-modal-imprimir" onclick="imprimirModal()">🖨️ Imprimir</button>
                <button class="btn-modal btn-modal-excel" onclick="exportarExcelModal()">📊 Excel</button>
                <button class="btn-modal btn-modal-editar" onclick="editarModal()">✏️ Recalcular</button>
            </div>
            <button class="btn-fechar" onclick="fecharModal()">✕ Fechar</button>
        </div>
        <div class="modal-content" id="modalContent"></div>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://wzmuswrjobxbfmddqkda.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6bXVzd3Jqb2J4YmZtZGRxa2RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODk0OTIsImV4cCI6MjA5Mjg2NTQ5Mn0.3DptbVZS76WTOPOJTZeFbBz7XHVYGsBCsLIffd9xItc';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// Sessão
const sessao = sessionStorage.getItem('precalc_user') || localStorage.getItem('precalc_user');
if (!sessao) { window.location.href = 'login.html'; }
if (!sessionStorage.getItem('precalc_user')) sessionStorage.setItem('precalc_user', sessao);
const user = JSON.parse(sessao);
document.getElementById('userNome').textContent = user.nome;

let _calculoAtual = null;

// Carregar contadores para o filtro
async function carregarContadores() {
    const { data } = await supabase.from('contadores').select('nome').order('nome');
    if (!data) return;
    const sel = document.getElementById('filtroContador');
    data.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.nome;
        opt.textContent = c.nome;
        sel.appendChild(opt);
    });
}

async function carregarHistorico(filtros = {}) {
    const tbody = document.getElementById('tabelaBody');
    tbody.innerHTML = '<tr><td colspan="9" class="loading-row">⏳ Carregando...</td></tr>';

    let query = supabase
    .from('calculos')
    .select('id, num_processo, beneficiario, credor, natureza, tipo_calculo, valor_total, contador_nome, data_calculo')
        .order('data_calculo', { ascending: false })
        .limit(300);

    if (filtros.processo) query = query.ilike('num_processo', `%${filtros.processo}%`);
    if (filtros.beneficiario) query = query.ilike('beneficiario', `%${filtros.beneficiario}%`);
    if (filtros.devedor) query = query.ilike('credor', `%${filtros.devedor}%`);
    if (filtros.tipo) query = query.eq('tipo_calculo', filtros.tipo);
    if (filtros.contador) query = query.eq('contador_nome', filtros.contador);
    if (filtros.de) query = query.gte('data_calculo', filtros.de);
    if (filtros.ate) query = query.lte('data_calculo', filtros.ate + 'T23:59:59');

    const { data, error } = await query;

    if (error || !data?.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">Nenhum cálculo encontrado.</td></tr>';
        document.getElementById('totalCount').textContent = '0 registros';
        return;
    }

    document.getElementById('totalCount').textContent = `${data.length} registro${data.length !== 1 ? 's' : ''}`;

    const badges = {
        ordem: '<span class="badge badge-ordem">Ordem</span>',
        acordo: '<span class="badge badge-acordo">Acordo</span>',
        preferencia: '<span class="badge badge-preferencia">Preferência</span>',
        parcial: '<span class="badge badge-parcial">Parcial</span>'
    };

    tbody.innerHTML = data.map((c, i) => {
        const dt = new Date(c.data_calculo).toLocaleString('pt-BR', {
            day:'2-digit', month:'2-digit', year:'numeric',
            hour:'2-digit', minute:'2-digit'
        });
        // Extrair valor total dos dados_entrada se disponível
        const valorTotal = c.valor_total 
        ? 'R$ ' + parseFloat(c.valor_total).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})
        : '—';

        return `
            <tr>
                <td style="color:var(--gray-400);font-size:11px;">${i+1}</td>
                <td class="mono">${c.num_processo || '—'}</td>
                <td>${c.beneficiario || '—'}</td>
                <td style="color:var(--gray-600);font-size:12px;">${c.credor || '—'}</td>
                <td>${badges[c.tipo_calculo] || c.tipo_calculo || '—'}</td>
                <td class="valor">${valorTotal}</td>
                <td><span class="user-badge">${c.contador_nome || '—'}</span></td>
                <td style="font-size:11.5px;color:var(--gray-600);">${dt}</td>
                <td>
                    <div class="acoes">
                        <div class="acoes-row">
                            <button class="btn-acao btn-ver" onclick="verCalculo('${c.id}')">👁 Ver</button>
                            <button class="btn-acao btn-imprimir" onclick="imprimirCalculo('${c.id}')">🖨️</button>
                        </div>
                        <div class="acoes-row">
                            <button class="btn-acao btn-editar" onclick="recarregarCalculo('${c.id}')">✏️ Recalc.</button>
                            <button class="btn-acao btn-excel" onclick="exportarExcelCalculo('${c.id}')">📊</button>
                        </div>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}

window.buscar = function() {
    carregarHistorico({
        processo: document.getElementById('filtroProcesso').value,
        beneficiario: document.getElementById('filtroBeneficiario').value,
        devedor: document.getElementById('filtroDevedor').value,
        tipo: document.getElementById('filtroTipo').value,
        contador: document.getElementById('filtroContador').value,
        de: document.getElementById('filtroDataDe').value,
        ate: document.getElementById('filtroDataAte').value,
    });
};

window.limparFiltros = function() {
    ['filtroProcesso','filtroBeneficiario','filtroDevedor','filtroTipo','filtroContador','filtroDataDe','filtroDataAte']
        .forEach(id => document.getElementById(id).value = '');
    carregarHistorico();
};

async function buscarCalculo(id) {
    const { data, error } = await supabase.from('calculos').select('*').eq('id', id).single();
    if (error || !data) { alert('Erro ao carregar cálculo.'); return null; }
    return data;
}

window.verCalculo = async function(id) {
    const data = await buscarCalculo(id);
    if (!data) return;
    _calculoAtual = data;

    const dt = new Date(data.data_calculo).toLocaleString('pt-BR');
    document.getElementById('modalTitulo').textContent = `${data.num_processo || 'Processo'} — ${data.beneficiario || ''}`;
    document.getElementById('modalMeta').textContent = `Calculado por ${data.contador_nome} em ${dt}`;
    
    // Injetar com div .results para herdar o CSS
    document.getElementById('modalContent').innerHTML = `
        <div class="results" style="padding:20px;">
            ${data.html_resultado}
        </div>
    `;
    document.getElementById('modalVer').classList.add('open');
};

window.fecharModal = function() {
    document.getElementById('modalVer').classList.remove('open');
    _calculoAtual = null;
};

function abrirJanelaImpressao(html, processo) {
    const w = window.open('', '_blank', 'width=1200,height=800');
    w.document.write(`<!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>PreCalc — ${processo || 'Resultado'}</title>
        <link rel="stylesheet" href="${window.location.origin}/style.css">
        <link rel="stylesheet" href="${window.location.origin}/resultados/resultadostyle.css">
        <link rel="stylesheet" href="${window.location.origin}/print.css" media="print">
    </head>
    <body>
        <div class="results">${html}</div>
        <script>
            window.addEventListener('load', () => setTimeout(() => window.print(), 1000));
        <\/script>
    </body>
    </html>`);
    w.document.close();
}

window.imprimirModal = function() {
    if (!_calculoAtual) return;
    abrirJanelaImpressao(_calculoAtual.html_resultado, _calculoAtual.num_processo);
};

window.imprimirCalculo = async function(id) {
    const data = await buscarCalculo(id);
    if (!data) return;
    abrirJanelaImpressao(data.html_resultado, data.num_processo);
};

window.exportarExcelModal = function() {
    if (!_calculoAtual) return;
    exportarExcelHTML(_calculoAtual.html_resultado, _calculoAtual.num_processo);
};

window.exportarExcelCalculo = async function(id) {
    const data = await buscarCalculo(id);
    if (!data) return;
    exportarExcelHTML(data.html_resultado, data.num_processo);
};

function exportarExcelHTML(html, processo) {
    const div = document.createElement('div');
    div.innerHTML = html;
    const tabelas = div.querySelectorAll('table');
    if (!tabelas.length) { alert('Sem tabelas para exportar.'); return; }

    let excelHtml = `<html><head><meta charset="UTF-8">
        <style>th{background:#1a2b4a;color:white;padding:8px;border:1px solid #ccc;}
        td{padding:6px 10px;border:1px solid #ccc;}h3{margin-top:20px;color:#1a2b4a;}</style>
        </head><body>`;

    tabelas.forEach(t => {
        const container = t.closest('[class]');
        const titulo = container?.querySelector('h3, h4');
        if (titulo) excelHtml += `<h3>${titulo.textContent.trim()}</h3>`;
        excelHtml += t.outerHTML + '<br>';
    });
    excelHtml += '</body></html>';

    const blob = new Blob(['\uFEFF' + excelHtml], { type:'application/vnd.ms-excel;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `calculo_${processo || 'resultado'}.xls`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

window.editarModal = function() {
    if (!_calculoAtual) return;
    recarregarDados(_calculoAtual);
};

window.recarregarCalculo = async function(id) {
    const data = await buscarCalculo(id);
    if (!data) return;
    recarregarDados(data);
};

function recarregarDados(data) {
    if (!data?.dados_entrada) { alert('Dados de entrada não disponíveis.'); return; }
    sessionStorage.setItem('precalc_recarregar', JSON.stringify(data.dados_entrada));
    window.location.href = 'index.html?recarregar=1';
}

window.sair = function() {
    sessionStorage.removeItem('precalc_user');
    localStorage.removeItem('precalc_user');
    window.location.href = 'login.html';
};

// Fechar modal clicando fora
document.getElementById('modalVer').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
});

// Enter para buscar
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('modalVer').classList.contains('open')) buscar();
});
